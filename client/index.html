<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap"
    />

    <script>
      // Enable scroll-reveal only when motion is allowed and IntersectionObserver
      // exists. Added synchronously (pre-paint) so no-JS / reduced-motion users
      // always see fully visible content with no flash.
      (function () {
        try {
          if (
            window.matchMedia &&
            !window.matchMedia('(prefers-reduced-motion: reduce)').matches &&
            'IntersectionObserver' in window
          ) {
            document.documentElement.classList.add('reveal-enabled');
          }
        } catch (e) {}
      })();
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
