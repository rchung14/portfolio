<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Self-hosted fonts (see src/styles/fonts.css). Preloading both covers
         every weight in use: each file is a single variable-font instance. -->
    <link
      rel="preload"
      href="/fonts/instrument-sans-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/newsreader-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <script>
      // Enable scroll-reveal only when motion is allowed and IntersectionObserver
      // exists. Added synchronously (pre-paint) so no-JS / reduced-motion users
      // always see fully visible content with no flash.
      (function () {
        try {
          if (
            window.matchMedia &&
            !window.matchMedia('(prefers-reduced-motion: reduce)').matches &&
            'IntersectionObserver' in window
          ) {
            document.documentElement.classList.add('reveal-enabled');
          }
        } catch (e) {}
      })();
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
